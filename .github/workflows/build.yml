name: Build and Test Oscar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17]

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: oscar
          MYSQL_DATABASE: oscar
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Initialize database
        run: |
          echo "Applying base schema..."
          mysql -h 127.0.0.1 -u root -poscar oscar < database/mysql/oscarinit.sql 2>/dev/null || true
          mysql -h 127.0.0.1 -u root -poscar oscar < database/mysql/oscarinit_bc.sql 2>/dev/null || true
          mysql -h 127.0.0.1 -u root -poscar oscar < database/mysql/oscardata.sql 2>/dev/null || true
          echo "Schema initialized"

      - name: Build with Maven
        run: mvn -B -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true package
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: Verify WAR artifact
        run: |
          ls -lh target/oscar-*.war
          echo "WAR built successfully"

      - name: Build status
        if: always()
        run: echo "Build completed with status: ${{ job.status }}"
